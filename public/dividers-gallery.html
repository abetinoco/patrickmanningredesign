<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>50 section dividers — pick a style</title>
  <style>
    :root {
      --cream: #f7f4ed;
      --deep: #1a2620;
      --deep2: #24302a;
      --orange: #d4703a;
      --ink: #1a1410;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #111;
      color: #e8e4dc;
      line-height: 1.45;
    }
    .page-head {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 12px;
    }
    .page-head h1 { font-size: 1.35rem; margin: 0 0 8px; font-weight: 700; }
    .page-head p { margin: 0; font-size: 0.9rem; opacity: 0.85; }
    .page-head a { color: var(--orange); }
    #gallery { max-width: 960px; margin: 0 auto; padding: 0 20px 80px; }
    .card {
      margin-bottom: 36px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: #1c1c1c;
    }
    .card h2 {
      margin: 0;
      padding: 10px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--orange);
      background: rgba(0,0,0,0.35);
    }
    .band {
      min-height: 52px;
      padding: 14px 16px;
      font-size: 0.8rem;
    }
    .band.cream { background: var(--cream); color: var(--ink); }
    .band.deep { background: var(--deep); color: rgba(255,255,255,0.88); }
    .dg-svg {
      display: block;
      width: 100%;
      height: 72px;
    }
    .dg-svg.sm { height: 48px; }
    .dg-svg.lg { height: 96px; }
    .dg-clip-wrap { position: relative; }
    .dg-clip-deep {
      background: var(--deep);
      color: rgba(255,255,255,0.88);
      padding: 28px 16px 20px;
      margin-top: -40px;
      padding-top: 48px;
      font-size: 0.8rem;
    }
    .dg-gradient-fade {
      height: 56px;
      background: linear-gradient(to bottom, var(--cream) 0%, var(--deep) 100%);
    }
    .dg-lines {
      height: 24px;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .dg-lines::before {
      content: "";
      display: block;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <header class="page-head">
    <h1>50 section dividers</h1>
    <p>Each card is a different technique. Open this file from the dev server: <a href="/">home</a> · <code>/dividers-gallery.html</code></p>
  </header>
  <div id="gallery"></div>
  <script>
    const cream = "#f7f4ed";
    const deep = "#1a2620";
    const deep2 = "#24302a";
    const deep3 = "#2f3d36";
    const orange = "#d4703a";

    function svg(h, inner, extra = "") {
      return `<svg class="dg-svg" viewBox="0 0 1200 ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
    }

    const demos = [
      { t: "Craggy polyline (tight)", h: 80, i: `<path fill="${deep}" d="M0 80 L0 58 L40 55 L70 38 L95 48 L115 22 L135 40 L160 28 L190 45 L220 32 L255 48 L285 30 L320 50 L350 38 L390 52 L420 28 L455 44 L490 55 L520 35 L555 50 L590 42 L620 24 L650 46 L685 58 L720 36 L755 50 L790 44 L825 26 L860 42 L895 54 L930 38 L965 48 L1000 32 L1035 46 L1070 52 L1105 36 L1140 48 L1175 55 L1200 58 L1200 80 Z"/>` },
      { t: "Three smooth humps (wave-like)", h: 60, i: `<path fill="${deep}" d="M0 60 L0 42 C200 20 400 55 600 35 C800 15 1000 48 1200 38 L1200 60 Z"/>` },
      { t: "Single giant arch", h: 70, i: `<path fill="${deep}" d="M0 70 L0 50 Q600 -5 1200 50 L1200 70 Z"/>` },
      { t: "Center pyramid", h: 75, i: `<path fill="${deep}" d="M0 75 L0 62 L520 62 L600 18 L680 62 L1200 62 L1200 75 Z"/>` },
      { t: "Offset double wave", h: 65, i: `<path fill="${deep2}" opacity="0.9" d="M0 65 L0 48 C300 28 500 58 800 38 C950 28 1100 45 1200 40 L1200 65 Z"/><path fill="${deep}" d="M0 65 L0 52 C250 38 450 22 700 45 C900 58 1050 48 1200 50 L1200 65 Z"/>` },
      { t: "Scallops (half-circles)", h: 50, i: `<path fill="${deep}" d="M0 50 L0 25 A50 25 0 0 1 100 25 A50 25 0 0 1 200 25 A50 25 0 0 1 300 25 A50 25 0 0 1 400 25 A50 25 0 0 1 500 25 A50 25 0 0 1 600 25 A50 25 0 0 1 700 25 A50 25 0 0 1 800 25 A50 25 0 0 1 900 25 A50 25 0 0 1 1000 25 A50 25 0 0 1 1100 25 A50 25 0 0 1 1200 25 L1200 50 Z"/>` },
      { t: "City skyline blocks", h: 70, i: `<path fill="${deep}" d="M0 70 L0 45 L80 45 L80 25 L120 25 L120 50 L200 50 L200 30 L260 30 L260 48 L340 48 L340 22 L400 22 L400 42 L480 42 L480 28 L540 28 L540 50 L640 50 L640 20 L700 20 L700 45 L780 45 L780 32 L860 32 L860 48 L940 48 L940 26 L1000 26 L1000 44 L1080 44 L1080 38 L1200 38 L1200 70 Z"/>` },
      { t: "Wide sawtooth (low frequency)", h: 55, i: `<path fill="${deep}" d="M0 55 L0 40 L200 15 L400 40 L600 12 L800 40 L1000 18 L1200 40 L1200 55 Z"/>` },
      { t: "Narrow teeth (high frequency)", h: 45, i: `<path fill="${deep}" d="M0 45 L0 30 L60 12 L120 30 L180 14 L240 30 L300 10 L360 30 L420 14 L480 30 L540 12 L600 30 L660 14 L720 30 L780 12 L840 30 L900 14 L960 30 L1020 12 L1080 30 L1140 14 L1200 30 L1200 45 Z"/>` },
      { t: "Asymmetric — cliff left", h: 65, i: `<path fill="${deep}" d="M0 65 L0 8 L280 45 L1200 52 L1200 65 Z"/>` },
      { t: "Valley dip center", h: 70, i: `<path fill="${deep}" d="M0 70 L0 35 L480 35 Q600 65 720 35 L1200 35 L1200 70 Z"/>` },
      { t: "Stroke-only sine (no fill body)", h: 50, i: `<path fill="none" stroke="${deep}" stroke-width="4" d="M0 28 C200 8 400 48 600 28 C800 8 1000 48 1200 28"/><rect fill="${deep}" y="28" width="1200" height="22"/>` },
      { t: "Three-layer mountains", h: 85, i: `<path fill="${deep3}" d="M0 85 L0 55 C200 40 400 60 600 48 C800 38 1000 52 1200 45 L1200 85 Z"/><path fill="${deep2}" d="M0 85 L0 58 C180 48 380 68 580 52 C780 38 980 55 1200 48 L1200 85 Z"/><path fill="${deep}" d="M0 85 L0 62 C220 52 420 72 640 55 C860 42 1020 58 1200 52 L1200 85 Z"/>` },
      { t: "Snow caps (white tips)", h: 75, i: `<path fill="${deep}" d="M0 75 L0 50 L200 20 L400 48 L600 15 L800 45 L1000 22 L1200 48 L1200 75 Z"/><path fill="#fff" opacity="0.92" d="M170 28 L200 20 L230 28 L200 32 Z"/><path fill="#fff" opacity="0.92" d="M570 22 L600 15 L630 22 L600 26 Z"/><path fill="#fff" opacity="0.92" d="M970 30 L1000 22 L1030 30 L1000 34 Z"/>` },
      { t: "Rounded terrace steps", h: 60, i: `<path fill="${deep}" d="M0 60 L0 50 L150 50 Q160 50 160 40 L160 38 L310 38 Q320 38 320 28 L320 26 L470 26 Q480 26 480 18 L480 16 L630 16 Q640 16 640 22 L640 24 L790 24 Q800 24 800 30 L800 32 L950 32 Q960 32 960 40 L960 42 L1110 42 Q1120 42 1120 48 L1120 50 L1200 50 L1200 60 Z"/>` },
      { t: "Chevron row ▼", h: 45, i: `<path fill="${deep}" d="M0 45 L0 30 L100 10 L200 30 L300 10 L400 30 L500 10 L600 30 L700 10 L800 30 L900 10 L1000 30 L1100 10 L1200 30 L1200 45 Z"/>` },
      { t: "Soft rolling (asymmetric beziers)", h: 68, i: `<path fill="${deep}" d="M0 68 L0 52 C150 30 280 58 420 38 C560 20 700 55 880 42 C1000 32 1120 48 1200 44 L1200 68 Z"/>` },
      { t: "Lightning jagged random", h: 55, i: `<path fill="${deep}" d="M0 55 L0 42 L45 38 L70 22 L95 40 L130 28 L160 45 L200 20 L230 48 L280 32 L310 50 L360 25 L400 46 L450 30 L500 48 L540 28 L590 44 L640 26 L690 50 L740 34 L800 46 L860 30 L920 48 L980 36 L1040 50 L1100 38 L1160 48 L1200 42 L1200 55 Z"/>` },
      { t: "Trapezoid notch", h: 50, i: `<path fill="${deep}" d="M0 50 L0 40 L400 40 L500 15 L700 15 L800 40 L1200 40 L1200 50 Z"/>` },
      { t: "Side peaks, flat center", h: 65, i: `<path fill="${deep}" d="M0 65 L0 25 L220 25 L320 48 L880 48 L980 25 L1200 25 L1200 65 Z"/>` },
      { t: "Wiggle hand-drawn (cubics)", h: 62, i: `<path fill="${deep}" d="M0 62 L0 48 C80 55 100 22 160 38 C220 52 260 28 340 44 C400 58 440 32 520 46 C600 60 640 35 720 48 C800 58 860 38 940 50 C1020 62 1080 42 1200 50 L1200 62 Z"/>` },
      { t: "Half fill gradient in SVG", h: 70, grad: true, i: `<defs><linearGradient id="__GID__" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${cream}"/><stop offset="45%" stop-color="${deep2}"/><stop offset="100%" stop-color="${deep}"/></linearGradient></defs><path fill="url(#__GREF__)" d="M0 70 L0 45 C300 25 600 55 900 35 C1000 28 1100 38 1200 32 L1200 70 Z"/>` },
      { t: "Dots along ridge", h: 50, i: `<path fill="${deep}" d="M0 50 L0 38 C400 15 800 45 1200 28 L1200 50 Z"/><g fill="${orange}">${Array.from({length:24},(_,i)=>`<circle cx="${25+i*50}" cy="${22+Math.sin(i)*6}" r="3"/>`).join("")}</g>` },
      { t: "Split diagonal two-tone", h: 55, i: `<path fill="${deep2}" d="M0 55 L1200 0 L1200 55 Z"/><path fill="${deep}" d="M0 55 L0 38 L1200 0 L1200 55 Z"/>` },
      { t: "Arches (U repeats)", h: 55, i: `<path fill="${deep}" d="M0 55 L0 20 Q75 55 150 20 Q225 55 300 20 Q375 55 450 20 Q525 55 600 20 Q675 55 750 20 Q825 55 900 20 Q975 55 1050 20 Q1125 55 1200 20 L1200 55 Z"/>` },
      { t: "Pixel stairs 24px", h: 48, i: `<path fill="${deep}" d="M0 48 L0 36 L96 36 L96 30 L192 30 L192 24 L288 24 L288 18 L384 18 L384 12 L480 12 L480 18 L576 18 L576 24 L672 24 L672 30 L768 30 L768 36 L864 36 L864 30 L960 30 L960 24 L1056 24 L1056 30 L1152 30 L1152 36 L1200 36 L1200 48 Z"/>` },
      { t: "Diamond saw", h: 45, i: `<path fill="${deep}" d="M0 45 L0 30 L30 15 L60 30 L90 15 L120 30 L150 15 L180 30 L210 15 L240 30 L270 15 L300 30 L330 15 L360 30 L390 15 L420 30 L450 15 L480 30 L510 15 L540 30 L570 15 L600 30 L630 15 L660 30 L690 15 L720 30 L750 15 L780 30 L810 15 L840 30 L870 15 L900 30 L930 15 L960 30 L990 15 L1020 30 L1050 15 L1080 30 L1110 15 L1140 30 L1170 15 L1200 30 L1200 45 Z"/>` },
      { t: "M-tabs", h: 50, i: `<path fill="${deep}" d="M0 50 L0 20 L100 40 L200 15 L300 40 L400 15 L500 40 L600 15 L700 40 L800 15 L900 40 L1000 15 L1100 40 L1200 20 L1200 50 Z"/>` },
      { t: "Horizontal stripes overlap", h: 60, i: `<rect fill="${deep2}" y="20" width="1200" height="40"/><rect fill="${deep}" y="35" width="1200" height="25"/>` },
      { t: "Thin orange rule + shadow", h: 32, i: `<rect fill="${cream}" width="1200" height="32"/><rect fill="${deep}" y="14" width="1200" height="18"/><rect fill="${orange}" opacity="0.9" x="80" y="10" width="1040" height="4" rx="2"/>` },
      { t: "Blob bottom (ellipse union feel)", h: 65, i: `<path fill="${deep}" d="M0 65 L0 48 Q150 20 300 42 Q450 18 600 40 Q750 22 900 38 Q1050 25 1200 45 L1200 65 Z"/>` },
      { t: "Wave + triangle mix", h: 60, i: `<path fill="${deep2}" d="M0 60 L0 38 C400 18 800 52 1200 32 L1200 60 Z"/><path fill="${deep}" d="M0 60 L0 45 L300 45 L400 22 L500 45 L1200 45 L1200 60 Z"/>` },
      { t: "Concave bowl center", h: 70, i: `<path fill="${deep}" d="M0 70 L0 30 Q600 75 1200 30 L1200 70 Z"/>` },
      { t: "Zig vertical rhythm (square wave)", h: 50, i: `<path fill="${deep}" d="M0 50 L0 20 L75 20 L75 35 L150 35 L150 20 L225 20 L225 35 L300 35 L300 20 L375 20 L375 35 L450 35 L450 20 L525 20 L525 35 L600 35 L600 20 L675 20 L675 35 L750 35 L750 20 L825 20 L825 35 L900 35 L900 20 L975 20 L975 35 L1050 35 L1050 20 L1125 20 L1125 35 L1200 35 L1200 50 Z"/>` },
      { t: "Torn paper (irregular)", h: 58, i: `<path fill="${deep}" d="M0 58 L0 41 L32 44 L58 36 L88 42 L120 33 L155 40 L190 35 L225 43 L265 38 L300 45 L340 37 L385 44 L420 36 L460 42 L505 34 L550 41 L595 38 L640 44 L685 36 L730 42 L775 35 L820 40 L865 37 L910 43 L955 39 L1000 44 L1045 36 L1090 41 L1135 38 L1180 42 L1200 40 L1200 58 Z"/>` },
      { t: "Sun peek (circle cut)", h: 70, i: `<path fill="${deep}" d="M0 70 L0 45 L1200 45 L1200 70 Z"/><circle fill="${cream}" cx="600" cy="48" r="38"/>` },
      { t: "Double horizon lines", h: 36, i: `<rect fill="${cream}" width="1200" height="36"/><line x1="0" y1="12" x2="1200" y2="12" stroke="${deep}" stroke-width="2"/><line x1="0" y1="22" x2="1200" y2="22" stroke="${deep2}" stroke-width="3" opacity="0.7"/>` },
      { t: "Hexagon lower edge", h: 48, i: `<path fill="${deep}" d="M0 48 L0 30 L50 15 L100 30 L150 15 L200 30 L250 15 L300 30 L350 15 L400 30 L450 15 L500 30 L550 15 L600 30 L650 15 L700 30 L750 15 L800 30 L850 15 L900 30 L950 15 L1000 30 L1050 15 L1100 30 L1150 15 L1200 30 L1200 48 Z"/>` },
      { t: "S-curve ribbon", h: 55, i: `<path fill="${deep}" d="M0 55 L0 40 C300 10 600 60 900 35 C1050 22 1150 40 1200 38 L1200 55 Z"/>` },
      { t: "Low-poly facets (6 faces)", h: 68, i: `<path fill="${deep}" d="M0 68 L0 45 L200 25 L350 48 L500 18 L700 42 L850 28 L1000 48 L1200 38 L1200 68 Z"/>` },
      { t: "Gradient bar only (no shape)", h: 40, i: `` },
      { t: "Clip: polygon slant", h: 0, clip: "polygon(0 0, 100% 0, 100% 85%, 0 100%)" },
      { t: "Clip: jagged CSS", h: 0, clip: "polygon(0% 100%, 0% 40%, 10% 55%, 20% 35%, 30% 50%, 40% 30%, 50% 48%, 60% 32%, 70% 50%, 80% 38%, 90% 52%, 100% 40%, 100% 100%)" },
      { t: "Repeating linear slash", mid: `<div style="height:44px;background:${cream};background-image:repeating-linear-gradient(-56deg,${deep} 0,${deep} 2px,transparent 2px,transparent 14px)"></div>` },
      { t: "Radial fade spotlight", mid: `<div style="height:52px;background:radial-gradient(ellipse 80% 100% at 50% 0%, ${deep} 0%, ${cream} 70%)"></div>` },
      { t: "Big dip + twin peaks", h: 72, i: `<path fill="${deep}" d="M0 72 L0 38 L400 38 L480 12 L560 38 L720 38 L800 15 L880 38 L1200 38 L1200 72 Z"/>` },
      { t: "Narrow V repeat", h: 40, i: `<path fill="${deep}" d="M0 40 L0 25 L60 8 L120 25 L180 8 L240 25 L300 8 L360 25 L420 8 L480 25 L540 8 L600 25 L660 8 L720 25 L780 8 L840 25 L900 8 L960 25 L1020 8 L1080 25 L1140 8 L1200 25 L1200 40 Z"/>` },
      { t: "Terracotta stripe + deep", h: 44, i: `<rect fill="${orange}" width="1200" height="6" y="0"/><rect fill="${cream}" width="1200" height="10" y="6"/><path fill="${deep}" d="M0 44 L0 20 C400 8 800 32 1200 18 L1200 44 Z"/>` },
      { t: "Diagonal slash (triangle fill)", h: 36, i: `<path fill="${deep}" d="M0 36 L1200 0 L1200 36 Z"/>` },
      { t: "Current asset (linked)", h: 72, i: `__FILE__` },
    ];

    const gallery = document.getElementById("gallery");

    demos.forEach((d, idx) => {
      const n = idx + 1;
      const card = document.createElement("article");
      card.className = "card";

      let mid = "";
      if (d.clip) {
        mid = `
          <div class="band cream">Light section</div>
          <div style="background:${cream};padding:0 0 8px">
            <div class="band deep" style="margin:0;clip-path:${d.clip};-webkit-clip-path:${d.clip};padding-top:56px;margin-top:-28px">Dark section (top edge is clip-path only)</div>
          </div>`;
      } else if (d.mid) {
        mid = `<div class="band cream">Light section</div>${d.mid}<div class="band deep">Dark section</div>`;
      } else if (d.t === "Gradient bar only (no shape)") {
        mid = `<div class="band cream">Light</div><div style="height:40px;background:linear-gradient(${cream},${deep})"></div><div class="band deep">Dark</div>`;
      } else if (d.i === "__FILE__") {
        mid = `<div class="band cream">Light — uses <code>/motif-range-divider.svg</code></div>
          <div style="height:96px;background:${cream} url(/motif-range-divider.svg) repeat-x center bottom;background-size:auto 100%"></div>
          <div class="band deep">Dark</div>`;
      } else {
        const cls = d.h > 75 ? "dg-svg lg" : d.h < 55 ? "dg-svg sm" : "dg-svg";
        let inner = d.i || "";
        if (d.grad) {
          const gid = "grad-" + n;
          inner = inner.replace(/__GID__/g, gid).replace(/__GREF__/g, "#" + gid);
        }
        mid = `<div class="band cream">Light section</div>
          <svg class="${cls}" viewBox="0 0 1200 ${d.h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">${inner}</svg>
          <div class="band deep">Dark section</div>`;
      }

      card.innerHTML = `<h2>${String(n).padStart(2, "0")} — ${d.t}</h2>${mid}`;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
